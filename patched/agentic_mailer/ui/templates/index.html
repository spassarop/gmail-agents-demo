<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Agentic ASI01 Demo</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header class="topbar">
    <div class="title">
      <div class="h1">Agentic ASI01 Demo</div>
      <div class="subtitle">Mode: <span class="badge">{{ mode }}</span> • Session: <span class="mono">{{ session_id }}</span></div>
    </div>
    <div class="controls">
      <button id="toggleTraceBtn" class="btn">Toggle trace</button>
      <button id="toggleThemeBtn" class="btn">Light mode</button>
      <button id="clearBtn" class="btn">Clear chat</button>
    </div>
  </header>

  <main class="layout">
    <section class="chat">
      <div id="chatLog" class="chatLog" aria-live="polite"></div>

      <div class="composer">
        <input id="chatInput" class="chatInput" type="text" placeholder="Ask: list my latest emails, summarize #1, draft a reply..." autocomplete="off" />
        <button id="sendBtn" class="btn primary">Send</button>
      </div>

      <div class="quick">
        <button class="btn small" data-quick="List my newest 5 emails">List newest 5</button>
        <button class="btn small" data-quick="Summarize email #1">Summarize #1</button>
        <button class="btn small" data-quick="Read email #1">Read #1</button>
        <button class="btn small" data-quick="Draft a reply to email #1 saying I will get back tomorrow">Draft reply</button>
      </div>
    </section>

    <aside class="tracePanel" id="tracePanel">
      <div class="traceHeader">
        <div class="traceTitle">Agent trace (debug)</div>
        <div class="traceHint">Shows model outputs, tool calls, and (patched mode) gate decisions.</div>
      </div>
      <pre id="traceOutput" class="traceOutput"></pre>
    </aside>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
